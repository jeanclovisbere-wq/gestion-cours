{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Cours</title>
    <link rel="stylesheet" href="{% static 'cours/style.css' %}">
</head>
<body>
    <div class="container fade-in">
        <div class="navbar">
            <h1>🎓 Gestion des Cours</h1>
            <a href="{% url 'cours-list' %}">📋 Liste des cours</a>
        </div>
        <div class="content">
            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-success">✅ {{ message }}</div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
    <script src="{% static 'cours/script.js' %}"></script>
</body>
</html>
