{% extends 'cours/base.html' %}
{% block content %}
<div class="form-container">
    <h2>{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <p style="color:red;">{{ field.errors }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="submit" class="btn btn-add">💾 Enregistrer</button>
            <a href="{% url 'cours-list' %}" class="btn btn-delete">❌ Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
